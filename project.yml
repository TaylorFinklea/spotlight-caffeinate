name: SpotlightCaffeinate
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.2
    CURRENT_PROJECT_VERSION: 1
targets:
  SpotlightCaffeinate:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SpotlightCaffeinate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.taylorfinklea.spotlightcaffeinate
        PRODUCT_NAME: Spotlight Caffeinate
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SpotlightCaffeinate/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    info:
      path: SpotlightCaffeinate/Info.plist
      properties:
        CFBundleDisplayName: Spotlight Caffeinate
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "1"
        LSUIElement: true
        NSSupportsAutomaticGraphicsSwitching: true
    scheme:
      gatherCoverageData: false
  SpotlightCaffeinateCLI:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SpotlightCaffeinateCLI
      - path: SpotlightCaffeinate/Models
      - path: SpotlightCaffeinate/Services
    settings:
      base:
        PRODUCT_NAME: spotlight-caffeinate-cli
        CODE_SIGNING_ALLOWED: NO
    scheme:
      gatherCoverageData: false
